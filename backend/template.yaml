AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: ReadyMix Dashboard — Concrete Delivery Management

# ─────────────────────────────────────────────────────────────────────────────
# Globals — defaults applied to every Lambda Function and API
# ─────────────────────────────────────────────────────────────────────────────
Globals:
  Function:
    Runtime: nodejs20.x
    Timeout: 10
    MemorySize: 256
    Architectures:
      - arm64                         # Graviton2 — ~20% cheaper, ~20% faster than x86
    Layers:
      - !Ref SharedLayer
    Environment:
      Variables:
        ORDERS_TABLE:  !Ref OrdersTable
        TRUCKS_TABLE:  !Ref TrucksTable
        PLANTS_TABLE:  !Ref PlantsTable
        REGION:        !Ref AWS::Region
        ENVIRONMENT:   !Ref Environment
        AURORA_CLUSTER_ARN: arn:aws:rds:us-east-1:357912269728:cluster:readymix-aurora-dev
        AURORA_SECRET_ARN:  arn:aws:secretsmanager:us-east-1:357912269728:secret:readymix-aurora-dev-credentials-uEIoa2
        AURORA_DATABASE:    readymix
        USE_LOCAL_PG:       ""
        PG_CONNECTION_STRING: ""
  Api:
    Cors:
      AllowMethods: "'GET,POST,PATCH,DELETE,OPTIONS'"
      AllowHeaders: "'Content-Type,Authorization,X-Amz-Date,X-Api-Key'"
      AllowOrigin:  "'*'"              # Lock to your CloudFront domain in prod

# ─────────────────────────────────────────────────────────────────────────────
# Parameters — configurable per environment
# ─────────────────────────────────────────────────────────────────────────────
Parameters:
  Environment:
    Type: String
    Default: dev
    AllowedValues: [dev, staging, prod]
    Description: Deployment environment (used to namespace all resource names)

# ─────────────────────────────────────────────────────────────────────────────
# Resources
# ─────────────────────────────────────────────────────────────────────────────
Resources:

  # ═══════════════════════════════════════════════════════════════════════════
  # DYNAMODB TABLES
  # ═══════════════════════════════════════════════════════════════════════════

  # ── Active Orders ──────────────────────────────────────────────────────────
  # Access patterns:
  #   Get today's orders for a plant  → PK=plantId, SK begins_with "2026-03-31"
  #   Get single order                → PK=plantId, SK="2026-03-31#TKT-0042"
  #   Filter by status                → GSI status-index: PK=plantId, SK=status
  #   Sort by requested time          → GSI time-index:   PK=plantId, SK=requestedTime
  OrdersTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub readymix-orders-${Environment}
      BillingMode: PAY_PER_REQUEST    # On-demand — no capacity planning needed
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true
      AttributeDefinitions:
        - AttributeName: plantId
          AttributeType: S
        - AttributeName: orderDateTicket  # "2026-03-31#TKT-2026-0001"
          AttributeType: S
        - AttributeName: status
          AttributeType: S
        - AttributeName: requestedTime
          AttributeType: S
      KeySchema:
        - AttributeName: plantId
          KeyType: HASH
        - AttributeName: orderDateTicket
          KeyType: RANGE
      GlobalSecondaryIndexes:
        - IndexName: status-index
          KeySchema:
            - AttributeName: plantId
              KeyType: HASH
            - AttributeName: status
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
        - IndexName: time-index
          KeySchema:
            - AttributeName: plantId
              KeyType: HASH
            - AttributeName: requestedTime
              KeyType: RANGE
          Projection:
            ProjectionType: ALL

  # ── Truck Status ───────────────────────────────────────────────────────────
  # Access patterns:
  #   Get single truck status         → PK=truckId
  #   Get all trucks for a plant      → GSI plant-status-index: PK=plantId
  #   Get available trucks for plant  → GSI plant-status-index: PK=plantId, SK=available
  TrucksTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub readymix-trucks-${Environment}
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: truckId
          AttributeType: S
        - AttributeName: plantId
          AttributeType: S
        - AttributeName: currentStatus
          AttributeType: S
      KeySchema:
        - AttributeName: truckId
          KeyType: HASH
      GlobalSecondaryIndexes:
        - IndexName: plant-status-index
          KeySchema:
            - AttributeName: plantId
              KeyType: HASH
            - AttributeName: currentStatus
              KeyType: RANGE
          Projection:
            ProjectionType: ALL

  # ── Plants (reference data) ────────────────────────────────────────────────
  # Access patterns:
  #   Get plant by ID                 → PK=plantId
  #   List all plants                 → Scan (small table, infrequent)
  PlantsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub readymix-plants-${Environment}
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: plantId
          AttributeType: S
      KeySchema:
        - AttributeName: plantId
          KeyType: HASH

  # ═══════════════════════════════════════════════════════════════════════════
  # AURORA SERVERLESS V2 (PostgreSQL)
  # ═══════════════════════════════════════════════════════════════════════════
  # AURORA (managed outside CloudFormation via express configuration)
  # Cluster: readymix-aurora-dev
  # Created with: aws rds create-db-cluster --with-express-configuration
  # ═══════════════════════════════════════════════════════════════════════════

  # ═══════════════════════════════════════════════════════════════════════════
  # SHARED LAMBDA LAYER
  # ═══════════════════════════════════════════════════════════════════════════

  # All three Lambda functions share this layer for DynamoDB client utilities,
  # HTTP response helpers, and logging. Keeps each service handler focused on
  # business logic rather than boilerplate.
  SharedLayer:
    Type: AWS::Serverless::LayerVersion
    Properties:
      LayerName: !Sub readymix-shared-${Environment}
      Description: DynamoDB Document Client wrapper, HTTP response helpers, logger
      ContentUri: layers/shared/
      CompatibleRuntimes:
        - nodejs20.x
      RetentionPolicy: Delete       # Clean up old versions on deploy

  # ═══════════════════════════════════════════════════════════════════════════
  # ORDERS SERVICE
  # ═══════════════════════════════════════════════════════════════════════════

  OrdersFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub readymix-orders-${Environment}
      Description: CRUD for delivery tickets — active orders in DynamoDB
      Handler: index.handler
      CodeUri: services/orders/
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref OrdersTable
        - DynamoDBReadPolicy:
            TableName: !Ref PlantsTable
        - Statement:
            - Effect: Allow
              Action:
                - rds-data:ExecuteStatement
                - rds-data:BatchExecuteStatement
                - rds-data:BeginTransaction
                - rds-data:CommitTransaction
                - rds-data:RollbackTransaction
              Resource: arn:aws:rds:us-east-1:357912269728:cluster:readymix-aurora-dev
            - Effect: Allow
              Action:
                - secretsmanager:GetSecretValue
              Resource: arn:aws:secretsmanager:us-east-1:357912269728:secret:readymix-aurora-dev-credentials-uEIoa2
      Events:
        ListOrders:
          Type: Api
          Properties:
            Path: /orders
            Method: get
        GetOrder:
          Type: Api
          Properties:
            Path: /orders/{ticketId}
            Method: get
        CreateOrder:
          Type: Api
          Properties:
            Path: /orders
            Method: post
        UpdateOrder:
          Type: Api
          Properties:
            Path: /orders/{ticketId}
            Method: patch
        SearchCustomers:
          Type: Api
          Properties:
            Path: /customers/search
            Method: get
        ListPlants:
          Type: Api
          Properties:
            Path: /plants
            Method: get
        ListMixDesigns:
          Type: Api
          Properties:
            Path: /mix-designs
            Method: get
        ListJobSites:
          Type: Api
          Properties:
            Path: /customers/{customerId}/job-sites
            Method: get
        GetMixDesign:
          Type: Api
          Properties:
            Path: /mix-designs/{mixDesignId}
            Method: get
        CreateMixDesign:
          Type: Api
          Properties:
            Path: /mix-designs
            Method: post
        UpdateMixDesign:
          Type: Api
          Properties:
            Path: /mix-designs/{mixDesignId}
            Method: patch
        ToggleMixDesignStatus:
          Type: Api
          Properties:
            Path: /mix-designs/{mixDesignId}/status
            Method: patch
        ListIngredients:
          Type: Api
          Properties:
            Path: /ingredients
            Method: get
        ListAdmixtures:
          Type: Api
          Properties:
            Path: /admixtures
            Method: get

  OrdersFunctionLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub /aws/lambda/readymix-orders-${Environment}
      RetentionInDays: 14

  # ═══════════════════════════════════════════════════════════════════════════
  # FLEET SERVICE
  # ═══════════════════════════════════════════════════════════════════════════

  FleetFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub readymix-fleet-${Environment}
      Description: Real-time truck status — reads/writes TrucksTable in DynamoDB
      Handler: index.handler
      CodeUri: services/fleet/
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref TrucksTable
        - DynamoDBReadPolicy:
            TableName: !Ref PlantsTable
        - Statement:
            - Effect: Allow
              Action:
                - rds-data:ExecuteStatement
                - rds-data:BatchExecuteStatement
                - rds-data:BeginTransaction
                - rds-data:CommitTransaction
                - rds-data:RollbackTransaction
              Resource: arn:aws:rds:us-east-1:357912269728:cluster:readymix-aurora-dev
            - Effect: Allow
              Action:
                - secretsmanager:GetSecretValue
              Resource: arn:aws:secretsmanager:us-east-1:357912269728:secret:readymix-aurora-dev-credentials-uEIoa2
      Events:
        ListFleet:
          Type: Api
          Properties:
            Path: /fleet
            Method: get
        GetTruck:
          Type: Api
          Properties:
            Path: /fleet/{truckId}
            Method: get
        UpdateTruckStatus:
          Type: Api
          Properties:
            Path: /fleet/{truckId}/status
            Method: patch

  FleetFunctionLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub /aws/lambda/readymix-fleet-${Environment}
      RetentionInDays: 14

  # ═══════════════════════════════════════════════════════════════════════════
  # TICKER SERVICE — Advances delivery lifecycle based on stored timelines
  # ═══════════════════════════════════════════════════════════════════════════

  TickerFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub readymix-ticker-${Environment}
      Description: Advances order/truck lifecycle — EventBridge triggered every 1 minute
      Handler: index.handler
      CodeUri: services/ticker/
      Timeout: 60
      MemorySize: 256
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref OrdersTable
        - DynamoDBCrudPolicy:
            TableName: !Ref TrucksTable
        - DynamoDBReadPolicy:
            TableName: !Ref PlantsTable
      Events:
        TickerSchedule:
          Type: Schedule
          Properties:
            Schedule: rate(1 minute)
            Description: Advance delivery lifecycle every minute
            Enabled: true

  TickerFunctionLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub /aws/lambda/readymix-ticker-${Environment}
      RetentionInDays: 14

  # ═══════════════════════════════════════════════════════════════════════════
  # ANALYTICS SERVICE  (Phase 5: Aurora SQL queries against delivery_history)
  # ═══════════════════════════════════════════════════════════════════════════

  AnalyticsFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub readymix-analytics-${Environment}
      Description: Operational analytics — Aurora SQL queries against delivery_history
      Handler: index.handler
      CodeUri: services/analytics/
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref OrdersTable
        - DynamoDBReadPolicy:
            TableName: !Ref TrucksTable
        - CloudWatchPutMetricPolicy: {}
        - Statement:
            - Effect: Allow
              Action:
                - rds-data:ExecuteStatement
                - rds-data:BatchExecuteStatement
                - rds-data:BeginTransaction
                - rds-data:CommitTransaction
                - rds-data:RollbackTransaction
              Resource: arn:aws:rds:us-east-1:357912269728:cluster:readymix-aurora-dev
            - Effect: Allow
              Action:
                - secretsmanager:GetSecretValue
              Resource: arn:aws:secretsmanager:us-east-1:357912269728:secret:readymix-aurora-dev-credentials-uEIoa2
      Events:
        GetVolume:
          Type: Api
          Properties:
            Path: /analytics/volume
            Method: get
        GetUtilization:
          Type: Api
          Properties:
            Path: /analytics/utilization
            Method: get
        GetCycleTimes:
          Type: Api
          Properties:
            Path: /analytics/cycle-times
            Method: get
        GetCustomers:
          Type: Api
          Properties:
            Path: /analytics/customers
            Method: get
        GetDrivers:
          Type: Api
          Properties:
            Path: /analytics/drivers
            Method: get

  AnalyticsFunctionLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub /aws/lambda/readymix-analytics-${Environment}
      RetentionInDays: 14

  # ═══════════════════════════════════════════════════════════════════════════
  # CLOUDWATCH ALARMS
  # ═══════════════════════════════════════════════════════════════════════════

  # Alarm fires when Orders Lambda throws >5 errors in a 5-minute window.
  # In production you'd route this to SNS → PagerDuty or email.
  OrdersErrorAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub readymix-orders-errors-${Environment}
      AlarmDescription: Orders Lambda error rate exceeded threshold (>5 errors/5 min)
      Namespace: AWS/Lambda
      MetricName: Errors
      Dimensions:
        - Name: FunctionName
          Value: !Ref OrdersFunction
      Statistic: Sum
      Period: 300        # 5 minutes
      EvaluationPeriods: 1
      Threshold: 5
      ComparisonOperator: GreaterThanThreshold
      TreatMissingData: notBreaching

  # Custom metric alarm — published by the Analytics Lambda after aggregation.
  # Fires when average cycle time exceeds the 90-minute benchmark.
  HighCycleTimeAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub readymix-high-cycle-time-${Environment}
      AlarmDescription: Average delivery cycle time exceeded 90-minute benchmark
      Namespace: ReadyMix
      MetricName: AverageCycleTimeMinutes
      Dimensions:
        - Name: Environment
          Value: !Ref Environment
      Statistic: Average
      Period: 900        # 15 minutes
      EvaluationPeriods: 2
      Threshold: 90
      ComparisonOperator: GreaterThanThreshold
      TreatMissingData: notBreaching

  # ═══════════════════════════════════════════════════════════════════════════
  # CLOUDWATCH DASHBOARD
  # ═══════════════════════════════════════════════════════════════════════════

  MonitoringDashboard:
    Type: AWS::CloudWatch::Dashboard
    Properties:
      DashboardName: !Sub readymix-${Environment}
      DashboardBody: !Sub |
        {
          "widgets": [
            {
              "type": "metric",
              "width": 12, "height": 6,
              "properties": {
                "region": "${AWS::Region}",
                "title": "Lambda Invocations",
                "metrics": [
                  ["AWS/Lambda", "Invocations", "FunctionName", "${OrdersFunction}"],
                  ["AWS/Lambda", "Invocations", "FunctionName", "${FleetFunction}"],
                  ["AWS/Lambda", "Invocations", "FunctionName", "${AnalyticsFunction}"]
                ],
                "period": 300, "stat": "Sum", "view": "timeSeries"
              }
            },
            {
              "type": "metric",
              "width": 12, "height": 6,
              "properties": {
                "region": "${AWS::Region}",
                "title": "Lambda Errors",
                "metrics": [
                  ["AWS/Lambda", "Errors", "FunctionName", "${OrdersFunction}"],
                  ["AWS/Lambda", "Errors", "FunctionName", "${FleetFunction}"]
                ],
                "period": 300, "stat": "Sum", "view": "timeSeries"
              }
            },
            {
              "type": "metric",
              "width": 12, "height": 6,
              "properties": {
                "region": "${AWS::Region}",
                "title": "API Gateway Latency (p50 / p99)",
                "metrics": [
                  ["AWS/ApiGateway", "Latency", "ApiName", "readymix-${Environment}", { "stat": "p50" }],
                  ["AWS/ApiGateway", "Latency", "ApiName", "readymix-${Environment}", { "stat": "p99" }]
                ],
                "period": 300
              }
            },
            {
              "type": "metric",
              "width": 12, "height": 6,
              "properties": {
                "region": "${AWS::Region}",
                "title": "Orders Dispatched (custom metric)",
                "metrics": [
                  ["ReadyMix", "OrdersDispatched", "Environment", "${Environment}"]
                ],
                "period": 300, "stat": "Sum"
              }
            },
            {
              "type": "metric",
              "width": 12, "height": 6,
              "properties": {
                "region": "${AWS::Region}",
                "title": "Aurora Serverless Capacity",
                "metrics": [
                  ["AWS/RDS", "ServerlessDatabaseCapacity", "DBClusterIdentifier", "readymix-aurora-${Environment}"],
                  ["AWS/RDS", "ACUUtilization", "DBClusterIdentifier", "readymix-aurora-${Environment}"]
                ],
                "period": 300, "stat": "Average", "view": "timeSeries"
              }
            }
          ]
        }

 # ═══════════════════════════════════════════
  # FRONTEND HOSTING
  # ═══════════════════════════════════════════

  FrontendBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub readymix-frontend-${Environment}
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true

  FrontendBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref FrontendBucket
      PolicyDocument:
        Statement:
          - Effect: Allow
            Principal:
              Service: cloudfront.amazonaws.com
            Action: s3:GetObject
            Resource: !Sub ${FrontendBucket.Arn}/*
            Condition:
              StringEquals:
                AWS:SourceArn: !Sub arn:aws:cloudfront::${AWS::AccountId}:distribution/${FrontendDistribution}

  FrontendOAC:
    Type: AWS::CloudFront::OriginAccessControl
    Properties:
      OriginAccessControlConfig:
        Name: !Sub readymix-oac-${Environment}
        OriginAccessControlOriginType: s3
        SigningBehavior: always
        SigningProtocol: sigv4

  FrontendDistribution:
    Type: AWS::CloudFront::Distribution
    Properties:
      DistributionConfig:
        Aliases:
           - readymix.earth
           - www.readymix.earth
        ViewerCertificate:
           AcmCertificateArn: arn:aws:acm:us-east-1:357912269728:certificate/101e74d0-60bf-486e-962e-58f8f2795ec1
           SslSupportMethod: sni-only
           MinimumProtocolVersion: TLSv1.2_2021
        Enabled: true
        DefaultRootObject: index.html
        Origins:
          - Id: S3Origin
            DomainName: !GetAtt FrontendBucket.RegionalDomainName
            OriginAccessControlId: !Ref FrontendOAC
            S3OriginConfig:
              OriginAccessIdentity: ""
        DefaultCacheBehavior:
          ViewerProtocolPolicy: redirect-to-https
          TargetOriginId: S3Origin
          CachePolicyId: 658327ea-f89d-4fab-a63d-7e88639e58f6  # CachingOptimized
          Compress: true
        CustomErrorResponses:
          - ErrorCode: 403          # S3 returns 403 for missing files
            ResponseCode: 200       # SPA fallback
            ResponsePagePath: /index.html
          - ErrorCode: 404
            ResponseCode: 200
            ResponsePagePath: /index.html

# ─────────────────────────────────────────────────────────────────────────────
# Outputs — values printed after `sam deploy` and available via CloudFormation
# ─────────────────────────────────────────────────────────────────────────────
Outputs:
  ApiUrl:
    Description: API Gateway endpoint URL — set as VITE_API_BASE_URL in frontend
    Value: !Sub https://${ServerlessRestApi}.execute-api.${AWS::Region}.amazonaws.com/Prod
    Export:
      Name: !Sub readymix-api-url-${Environment}

  OrdersTableName:
    Description: DynamoDB table name for active orders
    Value: !Ref OrdersTable
    Export:
      Name: !Sub readymix-orders-table-${Environment}

  TrucksTableName:
    Description: DynamoDB table name for real-time truck status
    Value: !Ref TrucksTable
    Export:
      Name: !Sub readymix-trucks-table-${Environment}

  PlantsTableName:
    Description: DynamoDB table name for plant reference data
    Value: !Ref PlantsTable
    Export:
      Name: !Sub readymix-plants-table-${Environment}

  FrontendUrl:
    Value: !Sub https://${FrontendDistribution.DomainName}
  FrontendBucketName:
    Value: !Ref FrontendBucket
  FrontendDistributionId:
      Value: !Ref FrontendDistribution

  AuroraClusterArn:
    Description: Aurora cluster ARN (managed outside CloudFormation)
    Value: arn:aws:rds:us-east-1:357912269728:cluster:readymix-aurora-dev
  AuroraSecretArn:
    Description: Secrets Manager ARN for Aurora credentials
    Value: arn:aws:secretsmanager:us-east-1:357912269728:secret:readymix-aurora-dev-credentials-uEIoa2