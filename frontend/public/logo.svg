  <circle cx="7" cy="22.5" r="1.3" fill="rgba(255,255,255,0.45)"/>
  <circle cx="7" cy="22.5" r="0.5" fill="#FF6D00"/>

  <circle cx="27" cy="22.5" r="2.8" fill="#FF6D00" opacity="0.9"/>
  <circle cx="27" cy="22.5" r="1.3" fill="rgba(255,255,255,0.45)"/>
  <circle cx="27" cy="22.5" r="0.5" fill="#FF6D00"/>
